name: ✨ 功能建议 / Feature request
description: 提议新增能力、规则或模板
title: "[Feat] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你提出建议。新能力会优先评估：是否在 LLM 决策层就能解决、是否需要引擎落地、对现有模板兼容性的影响。

  - type: checkboxes
    id: pre-checks
    attributes:
      label: 提交前检查
      options:
        - label: 我已搜索过现有 Issue，没有重复或冲突的提案。
          required: true
        - label: 我已确认现有 `references/` 中的规则无法满足这个需求。
          required: true

  - type: textarea
    id: problem
    attributes:
      label: 你想解决的问题
      description: 描述真实场景，而不是直接给方案。
      placeholder: |
        例：写实验报告时，公式截图与原生公式混排，希望能在 decision 里区分"图片公式"与"可编辑公式"。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 期望的解决方式
      description: 可以是 LLM 决策字段、引擎能力、模板规则、文档补充等。
    validations:
      required: true

  - type: dropdown
    id: layer
    attributes:
      label: 你认为这个能力应该落在哪一层
      options:
        - 文档级（documentRules）
        - 块级（blockDecisions）
        - 行内（runDecisions）
        - 对象级（图片 / 表格 / 公式）
        - 模板规则（references/template-catalog.md）
        - 引擎新能力（engine/src）
        - 不确定，请协助判断
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
      description: 当前是怎么绕过去的？

  - type: textarea
    id: extra
    attributes:
      label: 其他补充
      description: 相关学校规范 / 行业规范 / 文献链接、截图等。
